{% extends "base.html" %}

{% block body %}
<main class="product-editor-shell">
  <header class="topbar product-editor-topbar">
    <div class="product-editor-topbar-left">
      <div class="brand-lockup">
        <h1 id="product-editor-brand-title">Brasix</h1>
        <span class="brand-divider"></span>
        <p id="product-editor-brand-subtitle">Editor de produtos</p>
      </div>
    </div>

    <div id="product-editor-header-badges" class="editor-header-badges" aria-label="Estado do editor"></div>
    <div id="product-editor-header-actions" class="editor-header-actions" aria-label="Acoes do editor"></div>
  </header>

  <section id="product-editor-grid" class="product-editor-grid">
    <aside class="product-editor-sidebar product-editor-sidebar-left">
      <section class="editor-card product-editor-card product-editor-sidebar-card">
        <div class="section-head">
          <div>
            <p id="product-editor-left-eyebrow" class="eyebrow">Catalogo</p>
            <h2 id="product-editor-left-title">Produtos e filtros</h2>
          </div>
        </div>

        <div class="product-editor-actions-row">
          <button id="product-editor-create-button" class="editor-header-action" type="button">
            <span class="material-symbols-outlined">add</span>
            <span id="product-editor-create-label">Novo produto</span>
          </button>
          <button id="product-editor-duplicate-button" class="secondary-button" type="button">Duplicar produto</button>
        </div>

        <div class="product-editor-filter-form">
          <label class="field">
            <span id="product-editor-map-select-label">Mapa de trabalho</span>
            <div class="select-shell">
              <select id="product-editor-map-select" class="editor-input"></select>
              <span class="material-symbols-outlined">expand_more</span>
            </div>
          </label>

          <label class="field">
            <span id="product-editor-family-filter-label">Familia economica</span>
            <div class="select-shell">
              <select id="product-editor-family-filter" class="editor-input"></select>
              <span class="material-symbols-outlined">expand_more</span>
            </div>
          </label>

          <label class="field">
            <span id="product-editor-logistics-filter-label">Tipo logistico</span>
            <div class="select-shell">
              <select id="product-editor-logistics-filter" class="editor-input"></select>
              <span class="material-symbols-outlined">expand_more</span>
            </div>
          </label>

          <section class="product-editor-layer-section">
            <span id="product-editor-layer-toggle-label" class="eyebrow">Camada</span>
            <div class="product-editor-layer-toggle" role="group" aria-label="Camada do mapa">
              <button id="product-editor-layer-supply" class="product-editor-layer-button is-active" type="button">Oferta</button>
              <button id="product-editor-layer-demand" class="product-editor-layer-button" type="button">Demanda</button>
            </div>
          </section>
        </div>

        <div id="product-editor-list-summary" class="product-editor-summary"></div>
        <label class="field product-editor-product-choice-field">
          <span id="product-editor-product-list-label">Produtos existentes</span>
          <select id="product-editor-product-select" class="editor-input product-editor-product-select" size="16"></select>
        </label>
      </section>
    </aside>

    <div class="product-editor-resizer" data-resizer="left" aria-hidden="true"></div>

    <section class="product-editor-map-panel">
      <section class="editor-card product-editor-card product-editor-map-card">
        <div class="section-head">
          <div>
            <p id="product-editor-map-eyebrow" class="eyebrow">Mapa</p>
            <h2 id="product-editor-map-title">Oferta e demanda</h2>
          </div>
          <div id="product-editor-map-selection" class="product-editor-map-selection"></div>
        </div>

        <div class="map-frame product-editor-map-frame">
          <div id="product-editor-map-stage" class="map-stage product-editor-map-stage" aria-label="Mapa de produtos do Brasil"></div>
          <div id="product-editor-map-legend" class="product-editor-map-legend"></div>
          <div id="product-editor-status" class="editor-status-box product-editor-status"></div>
        </div>
      </section>
    </section>

    <div class="product-editor-resizer" data-resizer="right" aria-hidden="true"></div>

    <aside class="product-editor-sidebar product-editor-sidebar-right">
      <section class="editor-card product-editor-card product-editor-detail-card">
        <div class="section-head">
          <div>
            <p id="product-editor-right-eyebrow" class="eyebrow">Detalhes</p>
            <h2 id="product-editor-right-title">Produto selecionado</h2>
          </div>
        </div>

        <div id="product-editor-detail" class="product-editor-detail">
          <form id="product-editor-product-form" class="product-editor-form">
            <div class="product-editor-form-grid">
              <label class="field is-span-2">
                <span id="product-editor-product-name-label">Nome</span>
                <input id="product-editor-product-name-input" class="editor-input" type="text" />
              </label>

              <label class="field">
                <span id="product-editor-product-short-name-label">Nome curto</span>
                <input id="product-editor-product-short-name-input" class="editor-input" type="text" />
              </label>

              <label class="field">
                <span id="product-editor-product-emoji-label">Emoji</span>
                <input id="product-editor-product-emoji-input" class="editor-input" type="text" maxlength="4" />
              </label>

              <label class="field">
                <span id="product-editor-product-family-label">Familia</span>
                <div class="select-shell">
                  <select id="product-editor-product-family-select" class="editor-input"></select>
                  <span class="material-symbols-outlined">expand_more</span>
                </div>
              </label>

              <label class="field">
                <span id="product-editor-product-logistics-label">Tipo logistico</span>
                <div class="select-shell">
                  <select id="product-editor-product-logistics-select" class="editor-input"></select>
                  <span class="material-symbols-outlined">expand_more</span>
                </div>
              </label>

              <label class="field">
                <span id="product-editor-product-unit-label">Unidade</span>
                <input id="product-editor-product-unit-input" class="editor-input" type="text" />
              </label>

              <label class="field">
                <span id="product-editor-product-color-label">Cor</span>
                <input id="product-editor-product-color-input" class="editor-input product-editor-color-input" type="color" />
              </label>

              <label class="field">
                <span id="product-editor-product-density-label">Densidade</span>
                <div class="select-shell">
                  <select id="product-editor-product-density-select" class="editor-input">
                    <option value="low">Baixa</option>
                    <option value="medium">Media</option>
                    <option value="high">Alta</option>
                    <option value="very_high">Muito alta</option>
                  </select>
                  <span class="material-symbols-outlined">expand_more</span>
                </div>
              </label>

              <label class="field">
                <span id="product-editor-product-value-label">Valor</span>
                <div class="select-shell">
                  <select id="product-editor-product-value-select" class="editor-input">
                    <option value="low">Baixo</option>
                    <option value="medium">Medio</option>
                    <option value="high">Alto</option>
                    <option value="strategic">Estrategico</option>
                    <option value="premium">Premium</option>
                  </select>
                  <span class="material-symbols-outlined">expand_more</span>
                </div>
              </label>

              <div class="product-editor-checkbox-grid is-span-2">
                <label class="field product-editor-check">
                  <input id="product-editor-product-active-input" type="checkbox" />
                  <span id="product-editor-product-status-label">Ativo</span>
                </label>

                <label class="field product-editor-check">
                  <input id="product-editor-product-perishable-input" type="checkbox" />
                  <span>Perecivel</span>
                </label>

                <label class="field product-editor-check">
                  <input id="product-editor-product-fragile-input" type="checkbox" />
                  <span>Fragil</span>
                </label>

                <label class="field product-editor-check">
                  <input id="product-editor-product-hazardous-input" type="checkbox" />
                  <span>Perigoso</span>
                </label>

                <label class="field product-editor-check is-span-2">
                  <input id="product-editor-product-temperature-input" type="checkbox" />
                  <span>Precisa de controle termico</span>
                </label>
              </div>
            </div>

            <div class="product-editor-form-actions">
              <button id="product-editor-save-button" class="editor-header-action" type="submit">
                <span class="material-symbols-outlined">save</span>
                <span id="product-editor-save-label">Salvar produto</span>
              </button>
            </div>
          </form>

          <section class="product-editor-city-section">
            <div class="section-head product-editor-city-head">
              <div>
                <p class="eyebrow">Cidade</p>
                <h3 id="product-editor-city-panel-title">Cidade selecionada</h3>
              </div>
            </div>
            <div id="product-editor-city-detail" class="product-editor-city-detail"></div>
          </section>
        </div>
      </section>
    </aside>
  </section>
</main>

<script type="module">
  const productEditorModuleUrl = new URL("{{ request.url_for('static', path='js/editors/product-editor.js') }}", window.location.href);
  productEditorModuleUrl.searchParams.set("v", "20260330-2");

  function showProductEditorLoadError(error) {
    const target = document.getElementById("product-editor-status");
    if (!target) {
      return;
    }
    target.innerHTML = `<div class="editor-status-copy">Falha ao carregar o editor de produtos.</div><div class="editor-status-meta"><div><span>Erro</span><strong>${String(error?.message || error || "Falha desconhecida.")}</strong></div></div>`;
    console.error("Brasix product editor load failure:", error);
  }

  window.addEventListener("unhandledrejection", (event) => {
    showProductEditorLoadError(event.reason);
  });

  import(productEditorModuleUrl.href).catch(showProductEditorLoadError);
</script>
{% endblock %}
